<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%" opacity="0.35">
  <defs>
    <!-- Glow filter for nodes -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g fill="none">
    <!-- Network Lines -->
    <line x1="100" y1="150" x2="200" y2="80" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="100" y1="150" x2="320" y2="220" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="200" y1="80" x2="450" y2="110" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="320" y1="220" x2="450" y2="110" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="320" y1="220" x2="550" y2="280" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="450" y1="110" x2="680" y2="140" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="550" y1="280" x2="680" y2="140" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="550" y1="280" x2="750" y2="320" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    <line x1="680" y1="140" x2="750" y2="320" stroke="#A15C38" stroke-width="0.75" opacity="0.4" />
    
    <line x1="50" y1="400" x2="180" y2="480" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="180" y1="480" x2="300" y2="380" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="300" y1="380" x2="320" y2="220" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="300" y1="380" x2="480" y2="490" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="480" y1="490" x2="550" y2="280" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="480" y1="490" x2="620" y2="420" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="620" y1="420" x2="780" y2="500" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    <line x1="780" y1="500" x2="750" y2="320" stroke="#A15C38" stroke-width="0.75" opacity="0.3" />
    
    <line x1="750" y1="320" x2="900" y2="200" stroke="#A15C38" stroke-width="0.75" opacity="0.2" />
    <line x1="680" y1="140" x2="900" y2="200" stroke="#A15C38" stroke-width="0.75" opacity="0.2" />
    <line x1="780" y1="500" x2="920" y2="450" stroke="#A15C38" stroke-width="0.75" opacity="0.2" />
    
    <!-- Flowing Particle Waves (similar to the screenshot) -->
    <path d="M -50,250 C 150,150 250,350 450,250 C 650,150 750,350 1050,250" stroke="#A15C38" stroke-width="1.25" stroke-dasharray="3 6" opacity="0.3" />
    <path d="M -50,270 C 120,200 280,320 420,220 C 600,320 780,200 1050,290" stroke="#A15C38" stroke-width="1" stroke-dasharray="1 5" opacity="0.25" />
    <path d="M -50,210 C 180,100 220,380 480,210 C 680,100 720,380 1050,210" stroke="#A15C38" stroke-width="0.5" opacity="0.15" />
    
    <!-- Extra connection links to form network grids -->
    <path d="M 200,80 L 320,220 L 180,480 L 100,150 Z" stroke="#A15C38" stroke-width="0.5" opacity="0.15" />
    <path d="M 450,110 L 550,280 L 480,490 L 300,380 Z" stroke="#A15C38" stroke-width="0.5" opacity="0.15" />
    <path d="M 680,140 L 750,320 L 780,500 L 620,420 Z" stroke="#A15C38" stroke-width="0.5" opacity="0.15" />
  </g>

  <!-- Network Nodes (with subtle glow) -->
  <g fill="#A15C38" filter="url(#glow)">
    <!-- Primary Nodes -->
    <circle cx="100" cy="150" r="4.5" opacity="0.8" />
    <circle cx="200" cy="80" r="5" opacity="0.8" />
    <circle cx="320" cy="220" r="6" opacity="0.9" />
    <circle cx="450" cy="110" r="4" opacity="0.8" />
    <circle cx="550" cy="280" r="6" opacity="0.9" />
    <circle cx="680" cy="140" r="5" opacity="0.8" />
    <circle cx="750" cy="320" r="5.5" opacity="0.8" />
    
    <!-- Secondary Nodes -->
    <circle cx="50" cy="400" r="3.5" opacity="0.6" />
    <circle cx="180" cy="480" r="4" opacity="0.7" />
    <circle cx="300" cy="380" r="4.5" opacity="0.7" />
    <circle cx="480" cy="490" r="4.5" opacity="0.7" />
    <circle cx="620" cy="420" r="4" opacity="0.6" />
    <circle cx="780" cy="500" r="3.5" opacity="0.6" />
    
    <circle cx="900" cy="200" r="3" opacity="0.5" />
    <circle cx="920" cy="450" r="3" opacity="0.5" />
    
    <!-- Floating tiny particles -->
    <circle cx="150" cy="220" r="1.5" opacity="0.5" />
    <circle cx="260" cy="140" r="2" opacity="0.6" />
    <circle cx="380" cy="90" r="1.5" opacity="0.4" />
    <circle cx="410" cy="280" r="2" opacity="0.5" />
    <circle cx="500" cy="180" r="1.5" opacity="0.5" />
    <circle cx="600" cy="340" r="2" opacity="0.6" />
    <circle cx="710" cy="250" r="1.5" opacity="0.4" />
    <circle cx="830" cy="380" r="2" opacity="0.5" />
    <circle cx="860" cy="120" r="1.5" opacity="0.4" />
  </g>
</svg>
